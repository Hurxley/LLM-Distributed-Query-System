worker_id: worker_b
worker_name: 海外人才库 (PostgreSQL)
table: overseas

fields:
  - logical: person_token
    physical: id_card
    secret: true
    tokenize: hmac-sha256
    alias: [人员, 人, 人员标识]

  - logical: has_overseas
    physical: has_overseas
    alias: [海外经历, 有海外经历, 留学经历]
    mapping:
      "true": "有"
      "false": "无"

  - logical: study_country
    physical: study_country
    alias: [留学国家, 留学国, 国家]

  - logical: max_award_level
    physical: max_award_level
    alias: [获奖等级, 奖励等级, 获奖级别, 奖励级别, 最高奖励, 最高奖项]
    mapping:
      "无": 无
      "市级": 市级
      "省级": 省级
      "国家级": 国家级

  - logical: max_award_level_order
    physical: max_award_level_order
    derived: true
    alias: [获奖等级序号, 奖励序号]
    mapping:
      "0": 无
      "1": 市级
      "2": 省级
      "3": 国家级

  - logical: latest_award_year
    physical: latest_award_year
    alias: [获奖年份, 最近获奖年份, 奖项年份]
