<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>跨源安全统计原型系统</title>
<link rel="stylesheet" href="/static/style.css?v=9">
</head>
<body>

<div id="app">

  <!-- ═══ Header ═══ -->
  <header>
    <div class="header-glow"></div>
    <div class="header-content">
      <h1>跨源安全统计原型系统</h1>
    </div>
  </header>

  <!-- ═══ Query Input ═══ -->
  <section class="card query-card">
    <h2><span class="dot"></span> 查询输入</h2>
    <div class="card-body">
      <div class="query-input-row">
        <input type="text" id="query-input" placeholder="输入中文自然语言查询..." onkeydown="if(event.key==='Enter')submitQuery()">
        <button class="btn-primary" onclick="submitQuery()" id="submit-btn">解析查询</button>
      </div>
    </div>
  </section>

  <!-- ═══ Results Area ═══ -->
  <div id="results-area" style="display:none;">

    <!-- Parse + Plans two-column -->
    <div class="two-col">
      <!-- Parse Result -->
      <section class="card" id="parse-section">
        <h2><span class="dot"></span> 解析结果 <span class="subtitle-sm" id="parse-method"></span></h2>
        <div class="card-body" id="parse-result"></div>
        <div class="card-body" id="parse-sql" style="display:none;"></div>
      </section>

      <!-- Plan Comparison -->
      <section class="card" id="plans-section">
        <div class="card-header-bar">
          <h2><span class="dot"></span> 方案对比</h2>
          <span class="badge" id="plan-count"></span>
        </div>
        <div class="card-body" id="plan-list"></div>
        <div class="plan-actions-bar" id="plan-actions"></div>
      </section>
    </div>

    <!-- ═══ Atomic Operation Breakdown (dedicated module) ═══ -->
    <section class="card" id="atomic-section" style="display:none;">
      <h2><span class="dot"></span> ⏱ 原子操作耗时分解 <span class="subtitle-sm" id="atomic-plan-name"></span></h2>
      <div class="card-body" id="atomic-breakdown"></div>
    </section>

    <!-- Execution Status -->
    <section class="card" id="status-section" style="display:none;">
      <h2><span class="dot pulse"></span> 实时执行状态</h2>
      <div class="card-body">
        <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
        <div id="stage-cards"></div>
        <div class="timeline" id="event-timeline"></div>
      </div>
    </section>

    <!-- Final Result -->
    <section class="card" id="result-section" style="display:none;">
      <h2><span class="dot"></span> 查询结果</h2>
      <div class="card-body" id="final-result"></div>
    </section>

  </div>

</div>

<script src="/static/render.js?v=9"></script>
<script src="/static/ws.js?v=9"></script>
<script src="/static/app.js?v=9"></script>
</body>
</html>
